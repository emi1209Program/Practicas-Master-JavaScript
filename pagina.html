<!DOCTYPE HTML>
<html lang="es">

    <head>
        <meta charset="utf-8"/>

        <!-- 
        Título que aparecerá en la pestaña del navegador

        <title>Practicas en JS Emiliano Reséndiz</title>

    </head>
    
    <body>
        <!-- 
        SECCIÓN PARA AGREGAR PELÍCULAS
        -->

        <!-- Título de la sección -->
        <h1>Añade tu pelicula</h1>

        <!-- 
        Formulario para agregar una nueva película.
        JavaScript capturará el evento submit y guardará
        el valor del input en LocalStorage.
        -->
        <form action="" id="formPelicula">

            <!-- 
            Campo de texto donde el usuario escribirá
            el nombre de la película
            -->
            <input type="text" id="addPelicula"/>

            <!-- Botón para enviar el formulario -->
            <button type="submite">Guardar</button>

        </form>

        <!-- 
        LISTA DE PELÍCULAS GUARDADAS
        -->

        <!-- 
        Subtítulo que describe el contenido del contenedor
        -->
        <h2>
            Peliculas
        </h2>

        <!-- 
        CONTENEDOR DONDE SE MOSTRARÁN LAS PELÍCULAS

        Este div funcionará como contenedor para mostrar
        dinámicamente las películas desde JavaScript.

        El script insertará elementos <li> dentro de la lista
        utilizando manipulación del DOM.
        -->
        <div id="peliculas">
            <!-- 
            Lista donde se insertarán las películas
            guardadas en LocalStorage
            -->
            <ul id="peliculasList">
            </ul>
        </div>

        <!-- 
        SECCIÓN PARA BORRAR PELÍCULAS
        -->

        <!-- Título de la sección -->
        <h1>Borra tu pelicula</h1>

        <!-- 
        Formulario para eliminar una película del LocalStorage.
        El usuario escribirá el nombre de la película a eliminar.
        -->
        <form action="" id="formBorrarPelicula">

            <!-- Campo donde el usuario indicará qué película borrar -->
            <input type="text" id="deletePelicula"/>

            <!-- Botón para ejecutar la eliminación -->
            <button type="submite">Guardar</button>

        </form>


        <!--

        Este contenedor se utilizaba en ejercicios anteriores
